<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YueCharts WASM Demo</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f5;
      color: #333;
      padding: 24px;
    }

    h1 {
      margin-bottom: 16px;
      font-size: 1.5rem;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .version-badge {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      border-radius: 999px;
      background: #eef2ff;
      color: #3a56a7;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    .container {
      display: flex;
      gap: 24px;
      max-width: 1400px;
      margin: 0 auto;
    }

    .panel {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.1);
      padding: 16px;
      flex: 1;
      min-width: 0;
    }

    .panel h2 {
      font-size: 1rem;
      margin-bottom: 8px;
      color: #666;
    }

    textarea {
      width: 100%;
      height: 480px;
      font-family: "Cascadia Code", "Fira Code", "Consolas", monospace;
      font-size: 13px;
      border: 1px solid #ddd;
      border-radius: 4px;
      padding: 12px;
      resize: vertical;
      tab-size: 2;
    }

    textarea:focus {
      outline: 2px solid #5470c6;
      border-color: transparent;
    }

    .toolbar {
      margin: 12px 0;
      display: flex;
      gap: 8px;
      align-items: center;
    }

    button {
      padding: 8px 20px;
      font-size: 14px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      background: #5470c6;
      color: #fff;
      transition: background 0.15s;
    }

    button:hover {
      background: #3a56a7;
    }

    button:disabled {
      background: #aaa;
      cursor: not-allowed;
    }

    #status {
      font-size: 13px;
      color: #888;
    }

    #status.error {
      color: #c23531;
    }

    #output {
      border: 1px solid #ddd;
      border-radius: 4px;
      min-height: 480px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fafafa;
      overflow: auto;
    }

    #output svg {
      max-width: 100%;
      height: auto;
    }

    #echartsOutput {
      display: none;
      border: 1px solid #ddd;
      border-radius: 4px;
      background: #fafafa;
      overflow: hidden;
    }

    .examples-bar {
      margin-bottom: 12px;
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .examples-bar button {
      background: #eee;
      color: #333;
      font-size: 12px;
      padding: 4px 10px;
    }

    .examples-bar button:hover {
      background: #ddd;
    }

    .backend-toggle {
      display: inline-flex;
      border: 1px solid #ccc;
      border-radius: 6px;
      overflow: hidden;
      font-size: 13px;
    }

    .backend-toggle input[type=radio] {
      display: none;
    }

    .backend-toggle label {
      padding: 4px 14px;
      cursor: pointer;
      background: #f0f0f0;
      color: #555;
      user-select: none;
      transition: background 0.12s, color 0.12s;
      border-right: 1px solid #ccc;
    }

    .backend-toggle label:last-of-type {
      border-right: none;
    }

    .backend-toggle input[type=radio]:checked + label {
      background: #5470c6;
      color: #fff;
    }

    .backend-toggle label.loading {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .backend-toggle label.unavailable {
      opacity: 0.3;
      cursor: not-allowed;
      text-decoration: line-through;
    }
  </style>
</head>

<body>

  <h1>YueCharts WASM Demo <span class="version-badge" id="versionBadge">v0.4.14</span></h1>

  <div class="container">
    <div class="panel">
      <h2>ECharts JSON Option</h2>
      <div class="examples-bar" id="examplesBar"></div>
      <textarea id="jsonInput" spellcheck="false">{
  "width": 600,
  "height": 400,
  "title": { "text": "Weekly Sales" },
  "xAxis": {
    "type": "category",
    "data": ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"]
  },
  "yAxis": { "type": "value" },
  "series": [
    {
      "type": "bar",
      "name": "Sales",
      "data": [120, 200, 150, 80, 70, 110, 130]
    }
  ]
}</textarea>
      <div class="toolbar">
        <div class="backend-toggle">
          <input type="radio" name="backend" id="backendGC" value="gc" checked>
          <label for="backendGC" id="labelGC" class="loading">wasm-gc</label>
          <input type="radio" name="backend" id="backendLinear" value="linear">
          <label for="backendLinear" id="labelLinear" class="loading">wasm</label>
          <input type="radio" name="backend" id="backendECharts" value="echarts">
          <label for="backendECharts" id="labelECharts" class="loading">echarts.js</label>
        </div>
        <button id="renderBtn">Render</button>
        <span id="status">Loading renderers...</span>
      </div>
    </div>
    <div class="panel">
      <h2>SVG Output</h2>
      <div id="output"><span style="color:#aaa">Click "Render" to see the chart</span></div>
      <div id="echartsOutput"></div>
    </div>
  </div>

  <script type="module">
    const EXAMPLE_FILES = [
      "aria-template.json",
      "bar.json",
      "boxplot.json",
      "calendar.json",
      "calendar-simple.json",
      "candlestick.json",
      "chord.json",
      "chord-minAngle.json",
      "donut.json",
      "effectscatter.json",
      "funnel.json",
      "gauge.json",
      "geo-choropleth-scatter.json",
      "geo-compressed.json",
      "geo-hole.json",
      "geo-lines.json",
      "geo-map-statistic.json",
      "geo-multiline.json",
      "geo-regions-namemap.json",
      "geo-specialareas.json",
      "heatmap.json",
      "line.json",
      "matrix-merge.json",
      "matrix.json",
      "mixed.json",
      "multibar.json",
      "parallel.json",
      "pictorialbar.json",
      "pictorialbar-body-fill.json",
      "pictorialbar-clip.json",
      "pictorialbar-offset.json",
      "pictorialbar-path.json",
      "pictorialbar-path-dup.json",
      "pictorialbar-symbolsize.json",
      "pie.json",
      "pie-legend-selected.json",
      "bar-polar-stack-radial.json",
      "polar-bar.json",
      "polar-line.json",
      "polar-scatter.json",
      "radar.json",
      "scatter.json",
      "sunburst.json",
      "sunburst-visualMap.json",
      "themeriver.json",
      "treemap.json",
      "treemap-show-parent.json"
    ];

    const renderers = { gc: null, linear: null };
    const APP_VERSION = "0.4.14";
    const renderBtn = document.getElementById("renderBtn");
    const statusEl = document.getElementById("status");
    const outputEl = document.getElementById("output");
    const jsonInput = document.getElementById("jsonInput");
    const labelGC = document.getElementById("labelGC");
    const labelLinear = document.getElementById("labelLinear");
    const labelECharts = document.getElementById("labelECharts");
    const backendGC = document.getElementById("backendGC");
    const backendLinear = document.getElementById("backendLinear");
    const backendECharts = document.getElementById("backendECharts");
    const exBar = document.getElementById("examplesBar");
    const echartsOutputEl = document.getElementById("echartsOutput");
    const versionBadgeEl = document.getElementById("versionBadge");

    let echartsLib = null;
    let echartsChart = null;
    let renderSeq = 0;

    function syncOutputMode(backend) {
      const isEC = backend === "echarts";
      // 必须用显式值，不能用 ""（空字符串会移除 inline style，让 CSS display:none 重新生效）
      outputEl.style.display = isEC ? "none" : "flex";
      echartsOutputEl.style.display = isEC ? "block" : "none";
    }

    function activeRenderer() {
      const v = document.querySelector('input[name=backend]:checked').value;
      return renderers[v];
    }

    function waitForNextPaint() {
      return new Promise((resolve) => {
        requestAnimationFrame(() => requestAnimationFrame(resolve));
      });
    }

    async function loadExample(fileName) {
      try {
        const response = await fetch(`examples/${fileName}`);
        if (!response.ok) {
          throw new Error(`${response.status} ${response.statusText}`);
        }
        const text = await response.text();
        jsonInput.value = text;
        statusEl.textContent = `Loaded examples/${fileName}`;
        statusEl.className = "";
        onRender();
      } catch (e) {
        statusEl.textContent = `Failed to load examples/${fileName}: ${e.message}`;
        statusEl.className = "error";
      }
    }

    function populateExampleButtons() {
      for (const fileName of EXAMPLE_FILES) {
        const btn = document.createElement("button");
        btn.textContent = fileName.replace(/\.json$/, "");
        btn.title = `examples/${fileName}`;
        btn.addEventListener("click", () => {
          loadExample(fileName);
        });
        exBar.appendChild(btn);
      }
    }

    async function loadWasmGC() {
      const response = await fetch("_build/wasm-gc/release/build/cmd/wasm/wasm.wasm");
      if (!response.ok) throw new Error(`${response.status}`);
      const bytes = await response.arrayBuffer();
      const { instance } = await WebAssembly.instantiate(bytes, {}, {
        builtins: ["js-string"],
        importedStringConstants: "_"
      });
      if (instance.exports._start) instance.exports._start();
      const renderFn = instance.exports.render;
      const versionFn = instance.exports.version;
      return {
        render: (json) => renderFn(json),
        version: () => (typeof versionFn === "function" ? versionFn() : APP_VERSION),
      };
    }

    async function loadWasmLinear() {
      const response = await fetch("_build/wasm/release/build/cmd/wasm/wasm.wasm");
      if (!response.ok) throw new Error(`${response.status}`);
      const bytes = await response.arrayBuffer();

      let inputStr = "";
      let inputPos = 0;
      let outputChars = [];

      const importObject = {
        spectest: {
          print_char: (ch) => { outputChars.push(String.fromCharCode(ch)); }
        },
        input: {
          getchar: () => {
            if (inputPos >= inputStr.length) return -1;
            return inputStr.charCodeAt(inputPos++);
          }
        }
      };

      const { instance } = await WebAssembly.instantiate(bytes, importObject);
      if (instance.exports._start) instance.exports._start();
      const doRenderWasm = instance.exports.do_render;
      const versionFn = instance.exports.version;

      return {
        render: (json) => {
          inputStr = json;
          inputPos = 0;
          outputChars = [];
          doRenderWasm();
          let result = outputChars.join("");
          if (result.endsWith("\n")) result = result.slice(0, -1);
          return result;
        },
        version: () => (typeof versionFn === "function" ? versionFn() : APP_VERSION),
      };
    }

    // MoonBit 在 JSON 顶层加了几个自定义字段，渲染前需要提取出来作为 JS API 参数，
    // 不能直接传给 ECharts setOption（ECharts 不认识这些字段）：
    //   width / height  — 画布尺寸
    //   maps            — [{name, geoJSON}] GeoJSON 地图数据，需调 registerMap()
    const MOONBIT_TOP_FIELDS = new Set(["width", "height", "maps"]);

    async function loadEChartsRenderer() {
      // 用 script 标签加载 UMD 版本，比 ESM +esm 构建更稳定
      await new Promise((resolve, reject) => {
        const s = document.createElement("script");
        s.src = "https://cdn.jsdelivr.net/npm/echarts@6.0.0/dist/echarts.min.js";
        s.onload = resolve;
        s.onerror = () => reject(new Error("Failed to load echarts.min.js"));
        document.head.appendChild(s);
      });
      echartsLib = window.echarts;

      // 返回一个 async 渲染对象；ECharts 直接渲染到持久 #echartsOutput，返回 null
      return {
        render: async (json) => {
          const raw = JSON.parse(json);
          const width = Number(raw.width) || 600;
          const height = Number(raw.height) || 400;

          // 处理 MoonBit maps 字段：向 ECharts 注册内嵌的 GeoJSON
          if (Array.isArray(raw.maps)) {
            for (const m of raw.maps) {
              if (m.name && m.geoJSON) echartsLib.registerMap(m.name, m.geoJSON);
            }
          }

          // 调整持久容器尺寸
          echartsOutputEl.style.width = `${width}px`;
          echartsOutputEl.style.height = `${height}px`;

          // 首次初始化，或复用已有实例（此时容器已可见，尺寸正确）
          if (!echartsChart) {
            echartsChart = echartsLib.init(echartsOutputEl, null, { renderer: "svg", width, height });
          } else {
            echartsChart.resize({ width, height });
          }

          // 构造干净的 ECharts option
          const echartsOption = {};
          for (const [k, v] of Object.entries(raw)) {
            if (!MOONBIT_TOP_FIELDS.has(k)) echartsOption[k] = v;
          }
          echartsOption.animation = false;

          echartsChart.setOption(echartsOption, { notMerge: true });
          await waitForNextPaint();

          return null; // 渲染在 #echartsOutput 里，不需要返回 SVG 字符串
        },
        version: () => APP_VERSION,
      };
    }

    async function loadRenderers() {
      const [gcResult, linearResult, echartsResult] = await Promise.allSettled([
        loadWasmGC(),
        loadWasmLinear(),
        loadEChartsRenderer(),
      ]);

      if (gcResult.status === "fulfilled") {
        renderers.gc = gcResult.value;
        labelGC.classList.remove("loading");
      } else {
        console.warn("wasm-gc unavailable:", gcResult.reason);
        labelGC.classList.remove("loading");
        labelGC.classList.add("unavailable");
        backendGC.disabled = true;
      }

      if (linearResult.status === "fulfilled") {
        renderers.linear = linearResult.value;
        labelLinear.classList.remove("loading");
      } else {
        console.warn("wasm (linear) unavailable:", linearResult.reason);
        labelLinear.classList.remove("loading");
        labelLinear.classList.add("unavailable");
        backendLinear.disabled = true;
      }

      if (echartsResult.status === "fulfilled") {
        renderers.echarts = echartsResult.value;
        labelECharts.classList.remove("loading");
      } else {
        console.warn("echarts.js unavailable:", echartsResult.reason);
        labelECharts.classList.remove("loading");
        labelECharts.classList.add("unavailable");
        backendECharts.disabled = true;
      }

      const versionSource = renderers.gc || renderers.linear;
      if (versionBadgeEl) {
        const versionText = versionSource ? versionSource.version() : APP_VERSION;
        versionBadgeEl.textContent = `v${versionText}`;
      }

      if (!renderers.gc && renderers.linear) {
        backendLinear.checked = true;
      }
      if (!renderers.gc && !renderers.linear && renderers.echarts) {
        backendECharts.checked = true;
      }

      const anyReady = renderers.gc || renderers.linear || renderers.echarts;
      if (anyReady) {
        statusEl.textContent = "Renderers ready - select backend above";
        statusEl.className = "";
      } else {
        statusEl.textContent = "Failed to load any renderer";
        statusEl.className = "error";
      }
    }

    async function onRender() {
      const seq = ++renderSeq;
      const renderer = activeRenderer();
      if (!renderer) {
        statusEl.textContent = "This backend is not available";
        statusEl.className = "error";
        return;
      }
      const json = jsonInput.value.trim();
      if (!json) {
        statusEl.textContent = "Please enter JSON";
        statusEl.className = "error";
        return;
      }
      try { JSON.parse(json); } catch (e) {
        statusEl.textContent = "Invalid JSON: " + e.message;
        statusEl.className = "error";
        return;
      }

      // 切换输出面板（wasm 用 #output，echarts 用 #echartsOutput）
      const backend = document.querySelector("input[name=backend]:checked").value;
      syncOutputMode(backend);

      renderBtn.disabled = true;
      statusEl.textContent = "Rendering...";
      statusEl.className = "";

      try {
        const t0 = performance.now();
        const svg = await renderer.render(json);
        const elapsed = (performance.now() - t0).toFixed(1);
        if (seq !== renderSeq) {
          return;
        }
        // svg === null 表示 ECharts 已直接渲染到 #echartsOutput，无需注入
        if (svg !== null) outputEl.innerHTML = svg;
        statusEl.textContent = `Rendered in ${elapsed} ms`;
        statusEl.className = "";
      } catch (e) {
        if (seq !== renderSeq) {
          return;
        }
        statusEl.textContent = "Render error: " + e.message;
        statusEl.className = "error";
        console.error("Render error:", e);
      } finally {
        if (seq === renderSeq) {
          renderBtn.disabled = false;
        }
      }
    }

    function throttle(fn, delay) {
      let lastCall = 0;
      return function (...args) {
        const now = Date.now();
        if (now - lastCall >= delay) {
          lastCall = now;
          fn.apply(this, args);
        }
      };
    }

    renderBtn.addEventListener("click", onRender);
    jsonInput.addEventListener("keydown", (e) => {
      if (e.ctrlKey && e.key === "Enter") {
        e.preventDefault();
        onRender();
      }
    });

    const throttledRender = throttle(onRender, 300);
    jsonInput.addEventListener("input", throttledRender);
    [backendGC, backendLinear, backendECharts].forEach((radio) => {
      radio.addEventListener("change", () => {
        syncOutputMode(radio.value);
        onRender();
      });
    });

    populateExampleButtons();
    loadRenderers();
  </script>
</body>

</html>
